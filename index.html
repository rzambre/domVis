<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>domVis</title>
  <link rel="stylesheet" href="style/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
</head>
<body>

  <!-- ── Header ── -->
  <header id="app-header">
    <span class="logo">domVis</span>
    <input
      id="url-input"
      type="text"
      placeholder="https://example.com"
      value="https://example.com"
      autocomplete="off"
      spellcheck="false"
    />
    <button id="visualize-btn">Visualize</button>
  </header>

  <!-- ── Main body ── -->
  <div id="app-body">

    <!-- Sidebar -->
    <aside id="sidebar">

      <div class="sidebar-section" id="metrics-section">
        <div class="sidebar-section-title">Tree Metrics</div>
        <div class="sidebar-section-body" id="metrics-content">
          <span class="placeholder-text">No tree loaded yet.</span>
        </div>
      </div>

      <div class="sidebar-section" id="node-section">
        <div class="sidebar-section-title">Node Info</div>
        <div class="sidebar-section-body" id="node-content">
          <span class="placeholder-text">Click a node to inspect it.</span>
        </div>
      </div>

    </aside>

    <!-- Canvas -->
    <main id="canvas">
      <div id="status-overlay">
        <div class="placeholder-text">Enter a URL above and click Visualize.</div>
      </div>
      <svg id="tree-svg"></svg>
    </main>

  </div>

  <!-- ── Footer ── -->
  <footer id="app-footer">
    <div class="footer-links">
      <a href="https://github.com/rzambre/domVis" target="_blank">GitHub</a>
      <a href="https://www.rohitzambre.com" target="_blank">Rohit Zambre</a>
    </div>
    <span>DOM Tree Visualizer</span>
  </footer>

  <script src="script/data.js"></script>
  <script src="script/init.js"></script>
</body>
</html>
